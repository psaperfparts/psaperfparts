<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho | PSAPERFPARTS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --psa-red: #d90429; --psa-dark: #0b0b0b; }
        body { font-family: 'Inter', sans-serif; background-color: var(--psa-dark); color: #fff; min-height: 100vh; }
        .navbar { border-bottom: 2px solid var(--psa-red); background: #000 !important; }
        .navbar-brand { font-family: 'Orbitron'; color: var(--psa-red) !important; text-decoration: none; font-size: 1.5rem; }
        .cart-container { background: #1a1a1b; border-radius: 8px; padding: 30px; margin-top: 50px; border: 1px solid #333; }
        
        .cart-item { border-bottom: 1px solid #333; padding: 15px 0; display: flex; align-items: center; gap: 15px; }
        .cart-img { width: 70px; height: 70px; object-fit: cover; border-radius: 4px; border: 1px solid var(--psa-red); }
        .cart-info { flex-grow: 1; }
        
        .total-section { font-size: 1.5rem; font-weight: bold; color: var(--psa-red); }
        .discount-text { color: #28a745; font-size: 0.9rem; font-weight: bold; }
        
        .btn-checkout { background: var(--psa-red); color: white; font-weight: bold; width: 100%; padding: 15px; border: none; text-transform: uppercase; margin-top: 20px; transition: 0.3s; }
        .btn-checkout:hover { background: #ff002b; transform: scale(1.02); }
        
        /* Estilo para o campo de Cupão */
        .coupon-box { background: #222; padding: 15px; border-radius: 8px; margin-top: 20px; border: 1px dashed #444; }
        .empty-msg { opacity: 0.5; padding: 40px 0; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">PSA<span class="text-white">PERFPARTS</span></a>
            <a href="index.html" class="btn btn-outline-light btn-sm">Continuar a Comprar</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 cart-container">
                <h2 class="font-monospace mb-4 text-uppercase">O Teu Carrinho</h2>
                
                <div id="cart-content"></div>

                <div id="cart-footer" style="display: none;">
                    
                    <div class="coupon-box">
                        <label class="small fw-bold mb-2 d-block text-uppercase text-muted">Tens um código de desconto?</label>
                        <div class="input-group">
                            <input type="text" id="coupon-code" class="form-control bg-dark text-white border-secondary" placeholder="Inserir código...">
                            <button class="btn btn-outline-danger" type="button" onclick="applyCoupon()">APLICAR</button>
                        </div>
                        <div id="coupon-msg" class="mt-2"></div>
                    </div>

                    <div class="mt-4 pt-3 border-top">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <span class="text-muted">Subtotal:</span>
                            <span id="subtotal" style="color: #fff;">0,00€</span>
                        </div>
                        <div id="discount-row" class="d-flex justify-content-between align-items-center mb-1 d-none">
                            <span class="text-success">Desconto:</span>
                            <span id="discount-val" class="text-success">-0,00€</span>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mt-2">
                            <span class="fw-bold">TOTAL A PAGAR:</span>
                            <span class="total-section" id="cart-total">0,00€</span>
                        </div>
                    </div>
                    
                    <button onclick="checkout()" class="btn btn-checkout">Finalizar Pedido (WhatsApp)</button>
                    <button onclick="clearCart()" class="btn btn-link text-muted w-100 mt-3 small">Limpar Carrinho</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        let discountPercentage = 0;
        let activeCoupon = "";

        // Define aqui os teus códigos de desconto
        const coupons = {
            "ABERTURA": 10,       // 10% de desconto
            "PSAPERF": 15,      // 15% de desconto
            "2026": 5       // 5% de desconto

        };

        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('psa_cart')) || [];
            const container = document.getElementById('cart-content');
            const footer = document.getElementById('cart-footer');
            let subtotal = 0;

            if (cart.length === 0) {
                container.innerHTML = '<div class="text-center empty-msg"><h5>O teu carrinho está vazio.</h5></div>';
                footer.style.display = 'none';
                return;
            }

            footer.style.display = 'block';
            container.innerHTML = '';
            
            cart.forEach((item, index) => {
                subtotal += item.price;
                const itemImg = item.img || 'https://via.placeholder.com/70'; 
                container.innerHTML += `
                    <div class="cart-item d-flex align-items-center mb-3 p-3" style="background: #222; border-radius: 10px; border: 1px solid #333;">
                        <img src="${itemImg}" class="cart-img" alt="${item.name}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid var(--psa-red);">
                        <div class="cart-info ms-3 flex-grow-1">
                            <h6 class="mb-1 fw-bold text-uppercase" style="color: #fff; letter-spacing: 1px;">${item.name}</h6>
                            <p class="mb-0" style="font-size: 0.75rem; color: #aaa; line-height: 1.2;">
                                <span class="text-warning">⏳</span> Prazo de entrega: 1 semana
                            </p>
                        </div>
                        <div class="text-end ms-2">
                            <span class="fw-bold d-block" style="color: #fff; font-size: 1.1rem;">${item.price.toFixed(2)}€</span>
                            <button onclick="removeItem(${index})" class="btn btn-sm text-uppercase fw-bold p-0" style="color: #666; font-size: 0.65rem; border: none; background: none;">[ REMOVER ]</button>
                        </div>
                    </div>
                `;
            });

            calculateTotals(subtotal);
        }

        function applyCoupon() {
            const input = document.getElementById('coupon-code').value.toUpperCase();
            const msg = document.getElementById('coupon-msg');
            
            if (coupons[input]) {
                discountPercentage = coupons[input];
                activeCoupon = input;
                msg.innerHTML = `<span class="text-success small fw-bold">✓ Cupão ${input} aplicado (-${discountPercentage}%)</span>`;
                renderCart(); // Re-calcula os totais
            } else {
                discountPercentage = 0;
                activeCoupon = "";
                msg.innerHTML = '<span class="text-danger small fw-bold">✗ Código inválido</span>';
                renderCart();
            }
        }

        function calculateTotals(subtotal) {
            const discountAmount = subtotal * (discountPercentage / 100);
            const total = subtotal - discountAmount;

            document.getElementById('subtotal').innerText = subtotal.toFixed(2) + "€";
            
            if (discountPercentage > 0) {
                document.getElementById('discount-row').classList.remove('d-none');
                document.getElementById('discount-val').innerText = `-${discountAmount.toFixed(2)}€`;
            } else {
                document.getElementById('discount-row').classList.add('d-none');
            }

            document.getElementById('cart-total').innerText = total.toFixed(2) + "€";
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('psa_cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('psa_cart', JSON.stringify(cart));
            renderCart();
        }

        function clearCart() {
            if(confirm("Desejas limpar todo o carrinho?")) {
                localStorage.removeItem('psa_cart');
                discountPercentage = 0;
                activeCoupon = "";
                renderCart();
            }
        }

        function checkout() {
            const cart = JSON.parse(localStorage.getItem('psa_cart')) || [];
            const total = document.getElementById('cart-total').innerText;
            const subtotal = document.getElementById('subtotal').innerText;
            
            let message = "Olá PSAPERFPARTS! Gostaria de encomendar:\n\n";
            cart.forEach(item => {
                message += `- ${item.name} (${item.price.toFixed(2)}€)\n`;
            });

            if (activeCoupon !== "") {
                message += `\nSubtotal: ${subtotal}`;
                message += `\nCupão: ${activeCoupon} (-${discountPercentage}%)`;
            }
            
            message += `\n*TOTAL A PAGAR: ${total}*`;
            
            const phone = "351969155477";
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`);
        }

        renderCart();
    </script>
</body>
</html>
